<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regarden Magic Academy - Quest Board</title>
    <style>
        /* Simple, clean styling with a Wistoria: Wand & Sword theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Deep magical night blue */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e293b; /* Dark slate card */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 2px solid #eab308; /* Gold border for magic academy vibe */
            width: 100%;
            max-width: 450px;
        }

        h1 {
            text-align: center;
            color: #eab308;
            margin-top: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        p.subtitle {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #eab308;
        }

        button {
            padding: 10px 16px;
            background-color: #eab308;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #ca8a04;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            background-color: #334155;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #38bdf8; /* Default magic blue marker */
            font-size: 15px;
        }

        /* Styling for the delete button inside lists */
        .btn-delete {
            background-color: #ef4444;
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
        }

        .btn-delete:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body style="background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images8.alphacoders.com/137/thumb-1920-1370735.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;">


    <div class="container">
        <h1>⚔️ Regarden Quest Board 🪄</h1>
        <p class="subtitle">Track your Wand and Sword credits to climb the tower!</p>
        
        <div class="input-section">
            <input type="text" id="questInput" placeholder="Enter a new quest (e.g., Practice dungeon floor 5)...">
            <button id="addBtn">Add Quest</button>
        </div>

        <ul id="questList">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
